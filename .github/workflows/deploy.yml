name: Deploy

on:
  push:
    branches:
      - master

# Grant the permissions required to make a Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments to avoid race conditions
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Specify your preferred Node version
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # Faster and more reliable than 'install' for CI

      - name: Build project
        run: npm run build

      - name: Upload production-ready build files
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist # Ensure this matches your build output folder

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    # The 'if' is redundant here since 'on: push' is already restricted to master
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
